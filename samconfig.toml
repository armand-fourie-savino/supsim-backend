version = 0.1

[default.build.parameters]
use_container = true

[dev.global.parameters]
stack_name = "supsim-backend"

[dev.deploy.parameters]
region = "af-south-1"
capabilities = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
confirm_changeset = false
parameter_overrides = "Environment=dev GlueDatabaseName=supsim_dev AthenaWorkgroupName=primary AthenaOutputBucket=supsim-athena-results-dev"

[prod.global.parameters]
stack_name = "supsim-backend"

[prod.deploy.parameters]
region = "af-south-1"
capabilities = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
confirm_changeset = true
parameter_overrides = "Environment=prod GlueDatabaseName=supsim_prod AthenaWorkgroupName=primary AthenaOutputBucket=supsim-athena-results-prod"

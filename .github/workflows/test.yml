name: Test

on:
  pull_request:
    branches: [main]
    paths:
      - "layers/**"
      - "functions/**"
      - "tests/**"
      - "template.yaml"
      - "pyproject.toml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install -r layers/shared/requirements.txt

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy layers/ functions/

      - name: Test
        env:
          ORGANISATIONS_TABLE: supsim-organisations-test
          APP_CONFIG_TABLE: supsim-app-config-test
          GLUE_DATABASE: supsim_test
          ATHENA_WORKGROUP: primary
          ATHENA_OUTPUT_BUCKET: supsim-athena-results-test
          ENVIRONMENT: test
          AWS_DEFAULT_REGION: af-south-1
        run: pytest tests/ -v
